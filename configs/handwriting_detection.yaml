# Handwriting Detection Dataset Configuration (YOLO format)
# Classes: text (0), math (1)
# Source: DocLayNet + IAM (forms)

path: data/processed/detection
train: images/train
val: images/val
test: images/test

nc: 2
names:
  - text
  - math

# Training hyperparameters
hyp:
  lr0: 0.01
  lrf: 0.01
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 3.0
  warmup_momentum: 0.8
  warmup_bias_lr: 0.1
  box: 7.5
  cls: 0.5
  dfl: 1.5
  fl_gamma: 0.0
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  degrees: 5.0        # Slight rotation for handwriting aug
  translate: 0.1
  scale: 0.5
  shear: 2.0
  perspective: 0.0
  flipud: 0.0         # Text doesn't flip vertically
  fliplr: 0.0         # Text doesn't flip horizontally
  mosaic: 0.8
  mixup: 0.1
  copy_paste: 0.1

# Dataset statistics (filled after preparation)
# total_images: ~80000
# class_distribution:
#   text: ~65%
#   math: ~35%
